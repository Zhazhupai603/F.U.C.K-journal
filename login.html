<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录/注册 | 屎记期刊</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4.72.0/dist/clerk.browser.js" crossorigin="anonymous"></script>
</head>

<body>
<header class="header">
  <h1>登录 / 注册</h1>
  <p class="slogan">Truth Fades, S.H.I.T Lasts.</p>
</header>
<nav class="nav">
  <a href="index.html">返回首页</a>
</nav>

<div class="login-container">
  <!-- Clerk登录/注册组件 -->
  <div id="clerk-auth"></div>
</div>

<footer class="footer" style="text-align: center; padding: 30px 0; border-top: 1px solid #eee; margin-top: 50px;">
  <p>&copy; 2026 SHIT JOURNAL | All Rights Unreserved</p>
</footer>

<script>
// Clerk密钥
const CLERK_PUB_KEY = "pk_test_Zmx5aW5nLWxpemFyZC0xMy5jbGVyay5hY2NvdW50cy5kZXYk";

// 强制初始化登录组件
window.onload = async () => {
  try {
    await window.Clerk.load({ publishableKey: CLERK_PUB_KEY });
    // 渲染登录+注册界面
    window.Clerk.mountSignInAndUp("#clerk-auth", {
      appearance: { baseTheme: 'light' }
    });

    // 登录成功后自动跳回首页
    window.Clerk.addListener((auth) => {
      if (auth?.user) {
        window.location.href = "index.html";
      }
    });
  } catch (error) {
    alert("登录组件加载失败，请刷新页面重试！");
    console.error("Clerk加载失败:", error);
  }
};
</script>
</body>
</html>
