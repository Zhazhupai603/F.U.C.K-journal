<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台 | 屎记期刊</title>
<link rel="stylesheet" href="style.css">
<style>
  .user-list {
    margin: 30px 0;
    padding: 20px;
    border: 1px solid #eee;
    border-radius: 8px;
  }
  .user-list ul {
    margin-left: 20px;
    line-height: 2;
  }
  .user-list button {
    padding: 5px 10px;
    background: #000;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
  }
  .admin-panel {
    max-width: 800px;
    margin: 50px auto;
    padding: 0 20px;
  }
  .form-title {
    text-align: center;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #000;
    color: #FFF;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
  }
</style>
</head>
<body>
<header class="header">
  <h1>屎记期刊 | 管理员后台</h1>
</header>

<nav class="nav">
  <a href="index.html">返回首页</a>
  <a href="#" id="logout-btn" style="margin-left:15px;">退出登录</a>
</nav>

<div class="admin-panel">
  <div class="user-list">
    <h2 class="form-title">注册用户列表</h2>
    <div id="userListContent">点击下方按钮加载用户...</div>
    <button onclick="loadUserList()">加载所有注册用户</button>
    <p style="margin-top:10px; font-size:12px; color:#666;">
      注：显示所有通过网站注册的用户（数据存储在SheetDB）
    </p>
  </div>

  <h2 class="form-title">投稿管理 | PAPER MANAGEMENT</h2>
  <a href="https://wj.qq.com/stat/1/overview?sid=25846300&org=60060481740&lang=zhs" target="_blank" class="btn" style="width: auto; display: inline-block; margin-bottom: 30px;">查看所有投稿</a>
  
  <h2 class="form-title" style="margin-top: 50px;">发布稿件教程</h2>
  <ul style="margin-left: 20px; line-height: 2;">
    <li>1. 审核通过的稿件，复制标题/作者/摘要到 index.html 的 #papers 区域</li>
    <li>2. 修改后将 index.html 重新上传到 GitHub 仓库</li>
    <li>3. 等待1-2分钟，网站自动更新已发布稿件</li>
  </ul>
</div>

<script>
// 已替换为你的SheetDB API地址
const SHEETDB_API = "https://sheetdb.io/api/v1/ev8cjfow1i90w";

// 加载所有用户
async function loadUserList() {
  try {
    const res = await fetch(SHEETDB_API);
    const data = await res.json();
    const content = document.getElementById("userListContent");
    
    if (data.length === 0) {
      content.innerHTML = "<p>暂无注册用户</p>";
      return;
    }

    let html = "<ul>";
    data.forEach(item => {
      html += `<li>用户名：${item.username}</li>`;
    });
    html += "</ul>";
    content.innerHTML = html;
  } catch (e) {
    alert("加载用户失败，请重试！");
    console.error("加载用户报错：", e);
  }
}

// 检查管理员权限
window.onload = function() {
  const user = localStorage.getItem("loginUser");
  if (!user || user !== "admin") {
    alert("仅管理员可访问！");
    window.location.href = "index.html";
  }
  
  document.getElementById("logout-btn").onclick = function(e) {
    e.preventDefault();
    localStorage.removeItem("loginUser");
    window.location.href = "index.html";
  };
};
</script>
</body>
</html>
