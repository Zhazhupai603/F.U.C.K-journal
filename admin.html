<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台 | 屎记期刊</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4.72.0/dist/clerk.browser.js" crossorigin="anonymous"></script>
</head>
<body>
<header class="header">
  <h1>屎记期刊 | 管理员后台</h1>
</header>

<nav class="nav">
  <a href="index.html">返回首页</a>
  <a href="#" id="logout-btn" style="margin-left:15px;">退出登录</a>
</nav>

<div class="admin-panel">
  <h2 class="form-title">投稿管理 | PAPER MANAGEMENT</h2>
  <a href="https://wj.qq.com/stat/1/overview?sid=25846300&org=60060481740&lang=zhs" target="_blank" class="btn" style="width: auto; display: inline-block; margin-bottom: 30px;">查看所有投稿</a>
  
  <h2 class="form-title" style="margin-top: 50px;">发布稿件教程</h2>
  <ul style="margin-left: 20px; line-height: 2;">
    <li>1. 审核通过的稿件，复制标题/作者/摘要到 index.html 的 #papers 区域</li>
    <li>2. 修改后将 index.html 重新上传到 GitHub 仓库</li>
    <li>3. 等待1-2分钟，网站自动更新已发布稿件</li>
  </ul>
</div>

<script>
const CLERK_PUB_KEY = "pk_test_Zmx5aW5nLWxpemFyZC0xMy5jbGVyay5hY2NvdW50cy5kZXYk";
const ADMIN_EMAIL = "23301020010@m.fudan.edu.cn";

Clerk.load({ publishableKey: CLERK_PUB_KEY }).then(() => {
  // 退出登录
  document.getElementById("logout-btn").addEventListener('click', async (e) => {
    e.preventDefault();
    await Clerk.signOut();
    window.location.href = "index.html";
  });
  
  // 仅管理员可访问
  if (!Clerk.user || Clerk.user.emailAddresses[0]?.emailAddress !== ADMIN_EMAIL) {
    window.location.href = "index.html";
  }
});
</script>
</body>
</html>
