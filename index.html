<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>屎记期刊 | SHIT JOURNAL</title>
<link rel="stylesheet" href="style.css">
<!-- 集成Clerk登录组件 -->
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js"></script>
<style>
  /* 修复Clerk遮挡问题：限定组件宽度，取消全屏遮挡 */
  #clerk {
    display: inline-block;
    margin-left: 20px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<!-- 顶部标题区 -->
<header class="header">
  <h1>屎记期刊 | SHIT JOURNAL</h1>
  <p class="slogan">Truth Fades, S.H.I.T Lasts. 真理会过时，构石永恒。</p>
</header>

<!-- 导航栏 -->
<nav class="nav">
  <a href="index.html">HOME</a>
  <a href="submit.html" id="submit" style="display:none">SUBMIT 投稿</a>
  <a href="admin.html" id="admin" style="display:none">ADMIN 后台</a>
  <!-- Clerk登录/注册/退出组件（已加样式防遮挡） -->
  <div id="clerk"></div>
</nav>

<!-- 核心内容区 -->
<main class="content">
  <section class="section">
    <h2>RESEARCH ARTICLES 研究论文</h2>
    <hr>
    <div id="papers">
      <!-- 示例稿件 -->
      <div class="paper">
        <h3>基于摸鱼时长与咖啡摄入量的相关性研究</h3>
        <p>作者：Dr.摸鱼达人 | DOI: 10.S.H.I.T/2026.001</p>
        <p>摘要：本研究通过对500个工位的6个月跟踪，发现工位距离咖啡机每增加1米，摸鱼频率提升12.5%，且该结论具有统计学意义（p<0.0001，无实际意义）。</p>
      </div>
    </div>
  </section>
</main>

<!-- 底部 -->
<footer class="footer" style="text-align: center; padding: 30px 0; border-top: 1px solid #eee; margin-top: 50px;">
  <p>&copy; 2026 SHIT JOURNAL | All Rights Unreserved</p>
</footer>

<!-- Clerk初始化（修复监听+防遮挡） -->
<script>
// 你的Clerk Publishable Key
const PUB_KEY = "pk_test_Zmx5aW5nLWxpemFyZC0xMy5jbGVyay5hY2NvdW50cy5kZXYk";
// 替换成你的管理员邮箱（必须和Clerk注册邮箱一致）
const ADMIN_EMAIL = "23301020010@m.fudan.edu.cnss";

// 初始化Clerk并实时监听登录状态
Clerk.load({ publishableKey: PUB_KEY }).then(() => {
  // 渲染登录/退出按钮（限定为小型用户按钮，防遮挡）
  Clerk.mountUserButton("#clerk", {
    appearance: { baseTheme: 'light' }
  });

  // 实时监听登录状态变化（核心修复：确保登录后链接正常显示）
  Clerk.addListener((auth) => {
    const submitLink = document.getElementById("submit");
    const adminLink = document.getElementById("admin");
    if (auth.user) {
      // 登录后显示投稿链接
      submitLink.style.display = "inline";
      // 管理员邮箱显示后台链接
      if (auth.user.emailAddresses[0]?.emailAddress === ADMIN_EMAIL) {
        adminLink.style.display = "inline";
      } else {
        adminLink.style.display = "none";
      }
    } else {
      // 未登录隐藏所有功能链接
      submitLink.style.display = "none";
      adminLink.style.display = "none";
    }
  });
});
</script>
</body>
</html>
